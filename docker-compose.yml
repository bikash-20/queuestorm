services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: queuestorm:latest
    container_name: queuestorm
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - CLASSIFIER_BACKEND=rule_based
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); sys.exit(0 if r.getcode()==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 512m
    cpus: "1.0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
